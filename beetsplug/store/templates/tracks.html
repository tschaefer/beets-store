{% extends "base.html" %}

{% block content %}
  <div class="row">
    <div class="col-lg-12">
      <table class="table table-hover table-striped">
        <thead>
          <tr>
            <th><i class="fa fa-download"></i></th>
            <th>Title</th>
            <th class="hidden-xs">Duration</th>
            <th>Artist</th>
            <th class="hidden-xs">Album</th>
          </tr>
        </thead>
        <tbody>
          {% for track in tracks %}
          <tr>
            <td>
              <a href="{{ url_for('get_track_file', track_id=track.id) }}">
                <i class="fa fa-download"></i>
              </a>
            </td>
            <td>{{ track.title }}</td>
            <td class="hidden-xs">{{ track.length|duration }}</td>
            <td>{{ track.artist }}</td>
            <td class="hidden-xs">
              <a href="{{ url_for('get_album', album_id=track.album_id) }}">
                {{ track.album }}
              </a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
